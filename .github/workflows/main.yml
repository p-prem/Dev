name: Env Pipeline
on: push

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      APP_NAME: DevopsApp
      ENVIRONMENT: staging

    steps:
    - name: Print system info
      run: |
        echo "User: $GITHUB_ACTOR"
        echo "Repo: $GITHUB_REPOSITORY"

    - name: Print app name
      run: echo "App is $APP_NAME"

    - name: Print environment
      run: echo "Deploying to $ENVIRONMENT"
